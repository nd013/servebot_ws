ekf_filter_node:
    ros__parameters:
      # Real robot EKF config
      # EKF owns the odom→base_footprint TF (diff_drive TF is disabled via robot.launch.py override)
      frequency: 30.0

      two_d_mode: true

      publish_tf: true

      map_frame: map
      odom_frame: odom
      base_link_frame: base_footprint   # Real robot: EKF directly drives odom→base_footprint
      world_frame: odom

      # IMU — real MPU6050 via imu_republisher → imu_ekf topic
      imu0: imu_ekf
      imu0_config: [false, false, false,
                    false, false, false,
                    false, false, false,
                    false, false, true,    # vyaw only — gz bias handled, no raw accel
                    false, false, false]

      imu0_differential: true
      imu0_pose_use_child_frame: false

      # Odometry — real diff_drive_controller output
      odom0: servebot_controller/odom

